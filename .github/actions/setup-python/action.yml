name: Setup locked Python toolchain
description: Installs Python and uv without loading application secrets.
inputs:
  python-version:
    description: Exact supported Python version
    required: false
    default: '3.12.10'
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - shell: bash
      run: python -m pip install --disable-pip-version-check 'uv==0.5.18'
    - shell: bash
      run: uv sync --frozen --all-extras
