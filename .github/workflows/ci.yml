name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python
      - name: Dependency lock validation
        run: uv lock --check
      - name: Format and lint
        run: |
          uv run ruff format --check src tests scripts
          uv run ruff check src tests scripts
      - name: Strict type check
        run: uv run mypy src tests
      - name: Unit, architecture, contract, and coverage tests
        run: uv run pytest --cov=demo_command_center --cov-report=xml --cov-report=term-missing
      - name: Contract/schema validation
        run: |
          uv run python scripts/validate_contracts.py
          uv run python scripts/validate_workflows.py
          uv run python scripts/validate_production_hygiene.py
      - name: Migration structure validation
        run: uv run python scripts/validate_migrations.py
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
