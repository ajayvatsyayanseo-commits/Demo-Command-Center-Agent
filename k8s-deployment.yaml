---
# Horizontal Pod Autoscaler for API (based on CPU utilization)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-command-center-api-hpa
  namespace: demo-command-center
  labels:
    app.kubernetes.io/name: demo-command-center
    app.kubernetes.io/instance: demo-command-center-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: demo-command-center
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-command-center-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60  # Matches autoscaling_cpu_target
---
# Note: For worker autoscaling based on queue depth, consider using:
# 1. KEDA with AWS SQS scaler (recommended for SQS-based workloads)
# 2. Prometheus Adapter with custom metrics from CloudWatch
# 3. Custom metrics adapter
# See commented KEDA ScaledObject example in the Worker Deployment section above.
---
# Pod Disruption Budget for API
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-command-center-api-pdb
  namespace: demo-command-center
  labels:
    app.kubernetes.io/name: demo-command-center
    app.kubernetes.io/instance: demo-command-center-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: demo-command-center
spec:
  minAvailable: 2  # At least 2 pods should remain available during voluntary disruptions
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-command-center
      app.kubernetes.io/instance: demo-command-center-api
      app.kubernetes.io/component: api
---
# Pod Disruption Budget for Worker
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: demo-command-center-worker-pdb
  namespace: demo-command-center
  labels:
    app.kubernetes.io/name: demo-command-center
    app.kubernetes.io/instance: demo-command-center-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: demo-command-center
spec:
  minAvailable: 2  # At least 2 workers should remain available during voluntary disruptions
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-command-center
      app.kubernetes.io/instance: demo-command-center-worker
      app.kubernetes.io/component: worker
---
# Note: For production deployments, consider:
# 1. Using a GitOps tool like Argo CD or Flux for continuous deployment
# 2. Implementing proper image promotion with digests (not tags)
# 3. Using tools like Trivy or Snyk for image scanning in your CI/CD
# 4. Setting up proper monitoring and logging (Prometheus, Grafana, Loki, etc.)
# 5. Using Istio/Linkerd for service mesh if needed
# 6. Implementing backup and disaster recovery strategies
# 7. Regularly updating base images and dependencies
# 8. Conducting regular security audits and penetration tests
# 9. Using pod security standards (restricted) if your cluster supports it
# 10. Considering service accounts with minimal required permissions (least privilege)
# 11. For AWS EKS clusters: Use IAM Roles for Service Accounts (IRSA) or
#     eks-pod-identity-agent for AWS service access without storing credentials
# 12. For secrets management: Consider ExternalSecrets Operator to sync with AWS Secrets Manager
# 13. For ingress: Consider AWS Load Balancer Controller (ALB Ingress) for EKS
# 14. For monitoring: Consider CloudWatch Container Insights or Prometheus + Grafana
# 15. For logging: Consider CloudWatch Logs, FluentBit, or Loki stack