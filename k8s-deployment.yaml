# Scheduled Jobs as CronJobs
# These replace the EventBridge Scheduler functionality from AWS
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-evaluation
  namespace: demo-command-center
  labels:
    app.kubernetes.io/name: demo-command-center
    app.kubernetes.io/instance: model-evaluation
    app.kubernetes.io/part-of: demo-command-center
spec:
  schedule: "0 2 * * *"  # Daily at 2:00 AM UTC (matches evaluation_schedule_expression)
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: demo-command-center
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            supplementalGroups: [10001]
          restartPolicy: OnFailure
          containers:
          - name: evaluation
            image: REPLACE_WITH_ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/demo-command-center:SHA256_DIGEST
            imagePullPolicy: IfNotPresent
            command: ["python", "-m", "demo_command_center.cli.evaluate_drift"]
            envFrom:
            - configMapRef:
                name: demo-command-center-config
            - secretRef:
                name: demo-command-center-secrets
            env:
            - name: AWS_REGION
              value: "ap-south-1"
            resources:
              requests:
                cpu: 500m   # 0.5 vCPU
                memory: 1Gi
              limits:
                cpu: 1000m  # 1 vCPU
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 10001
              capabilities:
                drop:
                - ALL
---
