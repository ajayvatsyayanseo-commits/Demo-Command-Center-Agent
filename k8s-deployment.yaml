# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-command-center-worker
  namespace: demo-command-center
  labels:
    app.kubernetes.io/name: demo-command-center
    app.kubernetes.io/instance: demo-command-center-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: demo-command-center
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 3  # Base replicas; will be scaled by HPA/KEDA
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-command-center
      app.kubernetes.io/instance: demo-command-center-worker
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-command-center
        app.kubernetes.io/instance: demo-command-center-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: demo-command-center
      annotations:
        # prometheus.io/scrape: "true"
        # prometheus.io/port: "8080"
        # prometheus.io/path: "/metrics"
        # eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/<ROLE_NAME>
    spec:
      serviceAccountName: demo-command-center
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        supplementalGroups: [10001]
      containers:
      - name: worker
        image: REPLACE_WITH_ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/demo-command-center:SHA256_DIGEST  # Update via CI/CD
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "demo_command_center.workers"]
        envFrom:
        - configMapRef:
            name: demo-command-center-config
        - secretRef:
            name: demo-command-center-secrets
        env:
        - name: AWS_REGION
          value: "ap-south-1"
        # Resources based on ECS task definition (same as API)
        resources:
          requests:
            cpu: 500m   # 0.5 vCPU
            memory: 1Gi
          limits:
            cpu: 1000m  # 1 vCPU
            memory: 2Gi
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          capabilities:
            drop:
            - ALL
      # Note: For worker autoscaling based on queue depth, consider:
      # 1. Using KEDA (Kubernetes Event-driven Autoscaling) with AWS SQS scaler
      # 2. Using Prometheus Adapter with custom metrics from CloudWatch
      # 3. Using a custom metrics adapter
      # Example KEDA ScaledObject (if KEDA is installed):
      # apiVersion: keda.sh/v1alpha1
